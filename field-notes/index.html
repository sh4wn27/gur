<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GUR — Field Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  :root {
    --ink: #0e0f0c;
    --paper: #f6f3ec;
    --rule: rgba(14,15,12,0.18);
    --rule-strong: rgba(14,15,12,0.5);
    --muted: rgba(14,15,12,0.62);
    --accent: #1f5c3a;       /* deep editorial green */
    --accent-ink: #f6f3ec;
    --serif: "Instrument Serif", "Times New Roman", serif;
    --sans: "DM Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --density: 1;            /* 0.85 compact, 1 default, 1.2 airy */
    --maxw: 1320px;
  }
  [data-mode="dark"] {
    --ink: #ece7da;
    --paper: #0d0e0b;
    --rule: rgba(236,231,218,0.16);
    --rule-strong: rgba(236,231,218,0.45);
    --muted: rgba(236,231,218,0.62);
    --accent: #84c89a;
    --accent-ink: #0d0e0b;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; text-decoration: none; }

  /* ── Top bar ─────────────────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
  }
  .topbar-inner {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 14px 28px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
  }
  .brandmark { display: flex; align-items: center; gap: 10px; font-family: var(--serif); font-size: 22px; letter-spacing: -0.01em; }
  .brandmark .mark { width: 30px; height: 30px; background: url('logo-mark.png') center/contain no-repeat; flex-shrink: 0; }
  [data-mode="dark"] .brandmark .mark { filter: brightness(1.05); }
  .brandmark em { font-style: italic; }
  .topnav { display: flex; gap: 28px; justify-self: center; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .topnav a { padding: 6px 0; position: relative; color: var(--muted); transition: color .2s; }
  .topnav a:hover { color: var(--ink); }
  .topnav a.active { color: var(--ink); }
  .topnav a.active::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -16px; height: 1px; background: var(--accent);
  }
  .topright { display: flex; gap: 14px; justify-self: end; align-items: center; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .contact-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border: 1px solid var(--ink); border-radius: 999px;
    color: var(--ink);
    transition: background .2s, color .2s;
  }
  .contact-pill:hover { background: var(--ink); color: var(--paper); }

  /* ── Layout ──────────────────────────────────────────── */
  main { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }
  .pad-y { padding-top: calc(96px * var(--density)); padding-bottom: calc(96px * var(--density)); }
  .rule { border-top: 1px solid var(--rule); }
  .rule-strong { border-top: 1px solid var(--rule-strong); }

  .eyebrow {
    font-family: var(--mono);
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow::before {
    content: ""; display: inline-block; width: 18px; height: 1px; background: var(--accent);
  }
  .eyebrow.no-line::before { display: none; }

  /* ── Hero ────────────────────────────────────────────── */
  .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; padding-top: calc(80px * var(--density)); padding-bottom: calc(80px * var(--density)); }
  .hero-issue { display: flex; gap: 28px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding-bottom: 28px; border-bottom: 1px solid var(--rule); margin-bottom: 40px; grid-column: 1 / -1; }
  .hero-issue span:first-child { color: var(--accent); }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(44px, 7.2vw, 132px);
    line-height: 0.96;
    letter-spacing: -0.025em;
    margin: 0;
  }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero h1 .ampersand { font-style: italic; color: var(--accent); font-feature-settings: "salt" on; }
  .hero-right { display: flex; flex-direction: column; justify-content: space-between; gap: 40px; }
  .hero-lede { font-family: var(--serif); font-size: 22px; line-height: 1.4; max-width: 44ch; color: var(--ink); }
  .hero-lede strong { font-weight: 400; background: linear-gradient(transparent 70%, color-mix(in oklch, var(--accent) 35%, transparent) 70%); padding: 0 2px; }
  .cta-stack { display: flex; flex-direction: column; gap: 12px; align-items: flex-start; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px;
    border-radius: 999px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border: 1px solid transparent;
    transition: transform .15s, background .2s, color .2s, border-color .2s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary { background: var(--accent); color: var(--accent-ink); }
  .btn-primary:hover { background: var(--ink); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
  .btn-ghost:hover { background: var(--ink); color: var(--paper); }
  .btn .arrow { transition: transform .2s; }
  .btn:hover .arrow { transform: translateX(3px); }

  .hero-cta-row { display: flex; flex-wrap: wrap; gap: 10px; }

  /* ── Marquee strip ───────────────────────────────────── */
  .marquee {
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    overflow: hidden; padding: 18px 0;
    font-family: var(--serif); font-style: italic; font-size: 28px; color: var(--muted);
  }
  .marquee-track { display: flex; gap: 60px; white-space: nowrap; animation: scroll-x 50s linear infinite; }
  .marquee span { display: inline-flex; align-items: center; gap: 60px; }
  .marquee .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }
  @keyframes scroll-x { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ── Stats ──────────────────────────────────────────── */
  .stats {
    display: grid; grid-template-columns: 1.4fr repeat(3, 1fr); gap: 0;
    border-bottom: 1px solid var(--rule);
  }
  .stats-header { padding: 40px 30px 40px 0; border-right: 1px solid var(--rule); }
  .stats-header h3 { font-family: var(--serif); font-size: 32px; line-height: 1.1; margin: 0 0 12px; font-weight: 400; }
  .stats-header p { font-size: 14px; color: var(--muted); margin: 0; max-width: 28ch; }
  .stat { padding: 40px 30px; border-right: 1px solid var(--rule); position: relative; }
  .stat:last-child { border-right: none; }
  .stat .num { font-family: var(--serif); font-size: clamp(56px, 5.5vw, 88px); line-height: 1; font-weight: 400; letter-spacing: -0.02em; }
  .stat .num em { font-style: italic; color: var(--accent); }
  .stat .label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 14px; }

  /* ── Section header ──────────────────────────────────── */
  .sec-head {
    display: grid; grid-template-columns: auto 1fr auto; gap: 40px; align-items: end;
    padding-bottom: 28px; border-bottom: 1px solid var(--rule-strong);
    margin-bottom: 48px;
  }
  .sec-head .num { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--muted); }
  .sec-head h2 { font-family: var(--serif); font-weight: 400; font-size: clamp(40px, 4.4vw, 64px); line-height: 1; margin: 0; letter-spacing: -0.02em; }
  .sec-head h2 em { font-style: italic; color: var(--accent); }
  .sec-head .meta { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── Programs ───────────────────────────────────────── */
  .programs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
  .program {
    padding: 0 24px 32px;
    border-right: 1px solid var(--rule);
    display: flex; flex-direction: column; gap: 24px;
    cursor: pointer;
    position: relative;
    transition: background .2s;
  }
  .program:first-child { padding-left: 0; }
  .program:last-child { padding-right: 0; border-right: none; }
  .program:hover { background: color-mix(in oklch, var(--ink) 3%, transparent); }
  .program .figure {
    aspect-ratio: 3/4;
    background: repeating-linear-gradient(45deg, color-mix(in oklch, var(--ink) 6%, transparent) 0 8px, transparent 8px 16px);
    border: 1px solid var(--rule);
    display: flex; align-items: flex-end; padding: 16px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
    position: relative;
  }
  .program .figure::before {
    content: "FIG."; position: absolute; top: 16px; left: 16px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--muted);
  }
  .program .figure .ix { color: var(--accent); font-weight: 500; }
  .program .kicker { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .program h3 { font-family: var(--serif); font-weight: 400; font-size: 30px; line-height: 1.05; margin: 0; letter-spacing: -0.015em; }
  .program p { font-size: 14px; line-height: 1.55; color: var(--muted); margin: 0; }
  .program .link {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 8px; color: var(--ink);
    margin-top: auto; padding-top: 8px;
  }
  .program .link .arrow { transition: transform .2s; }
  .program:hover .link .arrow { transform: translateX(4px); }

  /* ── How we work ─────────────────────────────────────── */
  .process {
    display: grid; grid-template-columns: 1fr 2fr; gap: 80px;
  }
  .process-intro h2 { font-family: var(--serif); font-weight: 400; font-size: clamp(40px, 4.4vw, 64px); line-height: 1; margin: 0 0 24px; letter-spacing: -0.02em; }
  .process-intro h2 em { font-style: italic; color: var(--accent); }
  .process-intro p { font-family: var(--serif); font-size: 19px; line-height: 1.5; color: var(--muted); max-width: 32ch; }
  .steps { display: flex; flex-direction: column; }
  .step {
    display: grid; grid-template-columns: 80px 1fr 1fr; gap: 40px; align-items: start;
    padding: 32px 0;
    border-top: 1px solid var(--rule);
    transition: padding .2s;
    cursor: default;
  }
  .step:last-child { border-bottom: 1px solid var(--rule); }
  .step:hover { padding-left: 12px; }
  .step .n { font-family: var(--serif); font-style: italic; font-size: 48px; color: var(--accent); line-height: 1; }
  .step h4 { font-family: var(--serif); font-weight: 400; font-size: 28px; line-height: 1.1; margin: 0; letter-spacing: -0.01em; }
  .step p { font-size: 14px; line-height: 1.6; color: var(--muted); margin: 0; }

  /* ── Featured gallery ────────────────────────────────── */
  .gallery {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 24px;
  }
  .tile {
    background: repeating-linear-gradient(135deg, color-mix(in oklch, var(--ink) 5%, transparent) 0 10px, transparent 10px 20px);
    border: 1px solid var(--rule);
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: transform .3s;
  }
  .tile:hover { transform: scale(1.01); }
  .tile::before {
    content: attr(data-tag); position: absolute; top: 14px; left: 14px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  }
  .tile .cap {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 16px; background: linear-gradient(transparent, color-mix(in oklch, var(--paper) 88%, transparent));
    font-family: var(--serif); font-size: 18px;
  }
  .tile .cap em { color: var(--accent); font-style: italic; }
  .t1 { grid-column: span 7; aspect-ratio: 16/10; }
  .t2 { grid-column: span 5; aspect-ratio: 4/5; }
  .t3 { grid-column: span 4; aspect-ratio: 1; }
  .t4 { grid-column: span 4; aspect-ratio: 1; }
  .t5 { grid-column: span 4; aspect-ratio: 1; }

  /* ── CTA banner ─────────────────────────────────────── */
  .cta-banner {
    background: var(--ink); color: var(--paper);
    padding: 80px 28px;
    margin: 0 -28px;
    border-radius: 0;
  }
  .cta-banner-inner {
    max-width: var(--maxw); margin: 0 auto;
    display: grid; grid-template-columns: 1.4fr 1fr; gap: 60px; align-items: end;
  }
  .cta-banner h2 { font-family: var(--serif); font-weight: 400; font-size: clamp(48px, 5.5vw, 84px); line-height: 0.98; margin: 0; letter-spacing: -0.02em; }
  .cta-banner h2 em { font-style: italic; color: var(--accent); }
  .cta-banner .actions { display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }
  .cta-banner .btn-primary { background: var(--accent); color: var(--ink); }
  .cta-banner .btn-primary:hover { background: var(--paper); color: var(--ink); }
  .cta-banner .btn-ghost { color: var(--paper); border-color: var(--paper); }
  .cta-banner .btn-ghost:hover { background: var(--paper); color: var(--ink); }
  .cta-banner .meta { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(246,243,236,0.6); margin-bottom: 16px; }

  /* ── Footer ──────────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--rule);
    padding: 60px 0 32px;
  }
  .foot-grid {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px;
    padding-bottom: 60px; border-bottom: 1px solid var(--rule);
  }
  .foot-grid h5 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 0 0 16px; font-weight: 500; }
  .foot-grid ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  .foot-grid a:hover { color: var(--accent); }
  .foot-brand h4 { font-family: var(--serif); font-weight: 400; font-size: 36px; line-height: 1.05; margin: 0 0 16px; letter-spacing: -0.01em; }
  .foot-brand h4 em { font-style: italic; color: var(--accent); }
  .foot-brand p { font-size: 14px; color: var(--muted); max-width: 36ch; }
  .foot-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 28px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--muted); }
  .foot-bottom .socials { display: flex; gap: 18px; }
  .foot-bottom .socials a:hover { color: var(--accent); }

  /* ── Inner pages ─────────────────────────────────────── */
  .pageheader { padding: calc(80px * var(--density)) 0 calc(48px * var(--density)); border-bottom: 1px solid var(--rule); }
  .pageheader .row { display: flex; gap: 40px; align-items: end; justify-content: space-between; flex-wrap: wrap; }
  .pageheader h1 { font-family: var(--serif); font-weight: 400; font-size: clamp(64px, 8vw, 128px); line-height: 0.96; letter-spacing: -0.025em; margin: 20px 0 0; flex: 1; min-width: 0; }
  .pageheader h1 em { font-style: italic; color: var(--accent); }
  .pageheader .meta { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .pageheader .lede { font-family: var(--serif); font-size: 22px; line-height: 1.45; max-width: 52ch; margin: 32px 0 0; color: var(--muted); }
  .pageheader .lede strong { color: var(--ink); font-weight: 400; }

  /* About */
  .about-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 80px; align-items: start; padding: 80px 0; border-bottom: 1px solid var(--rule); }
  .about-grid h2 { font-family: var(--serif); font-weight: 400; font-size: 48px; line-height: 1.05; margin: 0 0 24px; letter-spacing: -0.02em; }
  .about-grid h2 em { font-style: italic; color: var(--accent); }
  .about-grid .body { columns: 2; column-gap: 32px; font-size: 15px; line-height: 1.7; color: var(--ink); }
  .about-grid .body p { margin: 0 0 14px; break-inside: avoid; }
  .about-grid .body p:first-child::first-letter { font-family: var(--serif); font-size: 56px; float: left; line-height: 0.85; padding-right: 8px; padding-top: 6px; color: var(--accent); }
  .about-side { font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
  .about-side dl { margin: 0; }
  .about-side dt { color: var(--muted); padding: 16px 0 4px; border-top: 1px solid var(--rule); }
  .about-side dt:first-child { border-top: none; padding-top: 0; }
  .about-side dd { margin: 0 0 16px; color: var(--ink); font-family: var(--serif); font-size: 22px; text-transform: none; letter-spacing: -0.005em; }

  .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; padding: 80px 0; border-bottom: 1px solid var(--rule); }
  .person {
    display: flex; flex-direction: column; gap: 12px;
  }
  .person .portrait {
    aspect-ratio: 4/5;
    background: repeating-linear-gradient(45deg, color-mix(in oklch, var(--ink) 6%, transparent) 0 8px, transparent 8px 16px);
    border: 1px solid var(--rule);
    display: flex; align-items: flex-end; padding: 14px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  }
  .person .name { font-family: var(--serif); font-size: 22px; line-height: 1.1; letter-spacing: -0.01em; }
  .person .role { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

  /* Projects detail */
  .proj-list { padding: 0; }
  .proj-row {
    display: grid; grid-template-columns: 80px 1fr 2fr 240px; gap: 40px;
    padding: 36px 0;
    border-bottom: 1px solid var(--rule);
    align-items: start;
    cursor: pointer;
    transition: padding-left .2s, background .2s;
  }
  .proj-row:hover { padding-left: 16px; background: color-mix(in oklch, var(--ink) 2.5%, transparent); }
  .proj-row .pn { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; padding-top: 12px; }
  .proj-row .pt { font-family: var(--serif); font-size: 32px; line-height: 1.05; letter-spacing: -0.015em; }
  .proj-row .pt em { font-style: italic; color: var(--accent); }
  .proj-row .pd { font-size: 14px; line-height: 1.6; color: var(--muted); }
  .proj-row .pmeta { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--muted); display: flex; flex-direction: column; gap: 6px; padding-top: 12px; }
  .proj-row .pmeta b { color: var(--ink); font-weight: 500; }

  /* Insights */
  .ins-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 32px; padding-top: 32px; }
  .ins {
    border-top: 1px solid var(--rule);
    padding-top: 24px;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 16px;
    transition: opacity .2s;
  }
  .ins:hover { opacity: 0.75; }
  .ins .fig {
    aspect-ratio: 4/3;
    background: repeating-linear-gradient(135deg, color-mix(in oklch, var(--ink) 5%, transparent) 0 8px, transparent 8px 16px);
    border: 1px solid var(--rule);
  }
  .ins .ix { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
  .ins h3 { font-family: var(--serif); font-weight: 400; font-size: 28px; line-height: 1.1; margin: 0; letter-spacing: -0.015em; }
  .ins .featured h3 { font-size: 44px; }
  .ins .featured .fig { aspect-ratio: 16/10; }
  .ins p { font-size: 14px; color: var(--muted); margin: 0; line-height: 1.55; }
  .ins .byline { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--muted); margin-top: auto; }

  /* Get involved */
  .involve { padding: 80px 0; }
  .paths { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px solid var(--rule-strong); border-bottom: 1px solid var(--rule); }
  .path {
    padding: 32px 24px; border-right: 1px solid var(--rule);
    display: flex; flex-direction: column; gap: 16px;
    cursor: pointer; transition: background .2s;
  }
  .path:last-child { border-right: none; }
  .path:hover { background: color-mix(in oklch, var(--ink) 3.5%, transparent); }
  .path .pn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--accent); }
  .path h3 { font-family: var(--serif); font-weight: 400; font-size: 30px; line-height: 1.05; margin: 0; letter-spacing: -0.015em; }

    border: none; border-bottom: 1px solid var(--rule-strong);

    background: transparent; color: var(--ink);
  }
  .seg .chip.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .form-actions { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--rule); }
  .form-actions .meta { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .form-success { padding: 28px; border: 1px solid var(--accent); border-radius: 4px; color: var(--ink); font-family: var(--serif); font-size: 22px; line-height: 1.4; }

  /* Inner page section heads */
  .sub-head { padding: 64px 0 24px; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: end; gap: 40px; }
  .sub-head h2 { font-family: var(--serif); font-weight: 400; font-size: 40px; line-height: 1; margin: 0; letter-spacing: -0.02em; }
  .sub-head h2 em { font-style: italic; color: var(--accent); }
  .sub-head .meta { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

  /* Values */
  .values { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; padding: 60px 0 90px; border-bottom: 1px solid var(--rule); }

  .page { animation: pagefade .35s cubic-bezier(.2,.7,.2,1); }
  @keyframes pagefade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    position: absolute; inset: 0; width: 100%; height: 100%;

  [data-accent="italic"] em,

    font-style: normal; color: var(--ink); font-weight: 400;

  }

  [data-accent="highlight"] em,

    font-style: normal; color: var(--ink); font-weight: 400;

  [data-accent="smallcaps"] em,

    font-style: normal; color: var(--accent); font-weight: 500;
    font-variant: small-caps; letter-spacing: 0.04em;
  }

  [data-accent="plain"] em,
  [data-accent="plain"] .accent {
    font-style: normal; color: var(--accent); font-weight: 500;
  }

  /* hero featured / asymmetric layouts */
  .hero-featured {
    grid-column: 1 / -1;

</style>

      <TweakSection label="Layout">
        <TweakRadio label="Density" value={tweaks.density} options={["compact","default","airy"]} onChange={(v) => setTweak("density", v)} />
        <TweakSelect label="Hero" value={tweaks.heroLayout}
          options={[["split","Split"],["stack","Stacked"],["centered","Centered"],["feature","Featured quote"],["asymmetric","Asymmetric"]]}
          onChange={(v) => setTweak("heroLayout", v)} />
        <TweakRadio label="Rule weight" value={tweaks.ruleWeight} options={["hairline","regular","strong"]} onChange={(v) => setTweak("ruleWeight", v)} />
        <TweakRadio label="Radius" value={tweaks.radius} options={["sharp","soft","round"]} onChange={(v) => setTweak("radius", v)} />
        <TweakSelect label="Figure pattern" value={tweaks.figurePattern}
          options={[["hatch","Hatch"],["cross","Cross-hatch"],["dots","Dots"],["lines","Horizontal"],["solid","Solid tint"],["noise","Noise"]]}
          onChange={(v) => setTweak("figurePattern", v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

// ── Root ──────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRouteState] = useState(() => {
    const h = window.location.hash.replace("#", "");
    return NAV.find(n => n.id === h) ? h : "home";
  });
  const setRoute = (id) => {
    setRouteState(id);
    window.location.hash = id;
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
  useEffect(() => {
    const onHash = () => {
      const h = window.location.hash.replace("#", "");
      if (NAV.find(n => n.id === h)) setRouteState(h);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  // Apply tweaks → CSS variables
  useEffect(() => {
    const root = document.documentElement;
    const p = (tweaks.mode === "dark" ? PALETTES_DARK : PALETTES)[tweaks.palette] || PALETTES.forest;
    root.style.setProperty("--ink", p.ink);
    root.style.setProperty("--paper", p.paper);
    root.style.setProperty("--accent", p.accent);
    root.style.setProperty("--accent-ink", tweaks.mode === "dark" ? p.paper : p.paper);
    root.dataset.mode = tweaks.mode;
    root.style.setProperty("--density", DENSITIES[tweaks.density]);
    // Rule weights
    const rw = RULE_WEIGHTS[tweaks.ruleWeight] || RULE_WEIGHTS.regular;
    const inkRgb = tweaks.mode === "dark" ? "236,231,218" : "14,15,12";
    root.style.setProperty("--rule",        `rgba(${inkRgb}, ${rw.rule})`);
    root.style.setProperty("--rule-strong", `rgba(${inkRgb}, ${rw.strong})`);
    // Radius
    root.style.setProperty("--radius", RADII[tweaks.radius] || "0px");
    // Figure pattern
    root.style.setProperty("--fig-bg", FIG_PATTERNS[tweaks.figurePattern] || FIG_PATTERNS.hatch);
    // Accent style
    root.dataset.accent = tweaks.accentStyle || "italic";
    const fp = FONT_PAIRS[tweaks.fontPair] || FONT_PAIRS.instrument_dm;
    root.style.setProperty("--serif", fp.serif);
    root.style.setProperty("--sans", fp.sans);
    // Lazy-load extra fonts if needed
    if (fp.load && !document.getElementById("font-extra-" + tweaks.fontPair)) {
      const link = document.createElement("link");
      link.id = "font-extra-" + tweaks.fontPair;
      link.rel = "stylesheet";
      link.href = "https://fonts.googleapis.com/css2?family=" + fp.load.replaceAll("|", "&family=") + "&display=swap";
      document.head.appendChild(link);
    }
  }, [tweaks]);

  const Page = { home: Home, about: About, projects: Projects, insights: Insights, involve: GetInvolved }[route] || Home;

  return (
    <>
      <Header route={route} setRoute={setRoute} />
      <Page key={route} setRoute={setRoute} tweaks={tweaks} />
      <Footer setRoute={setRoute} />
      <Tweaks tweaks={tweaks} setTweak={setTweak} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
