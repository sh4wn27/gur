<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GUR — Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap">
<style>
  :root {
    --ink: #f6f6f3;
    --paper: #0a0d0a;
    --paper-2: #111511;
    --rule: rgba(246,246,243,0.10);
    --rule-strong: rgba(246,246,243,0.35);
    --muted: rgba(246,246,243,0.55);
    --soft: rgba(246,246,243,0.04);
    --accent: #6cff5a;       /* signal terminal green */
    --accent-ink: #0a0d0a;
    --display: "Bricolage Grotesque", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --sans: "DM Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --density: 1;
    --maxw: 1480px;
    --gutter: 36px;
  }
  [data-mode="light"] {
    --ink: #0a0d0a;
    --paper: #f6f6f3;
    --paper-2: #ededeb;
    --rule: rgba(10,13,10,0.10);
    --rule-strong: rgba(10,13,10,0.35);
    --muted: rgba(10,13,10,0.55);
    --soft: rgba(10,13,10,0.04);
    --accent: #1f7a30;
    --accent-ink: #f6f6f3;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: clip; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  /* film grain */
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 30% 20%, color-mix(in oklch, var(--accent) 10%, transparent) 0, transparent 50%),
      radial-gradient(circle at 80% 80%, color-mix(in oklch, var(--accent) 6%, transparent) 0, transparent 60%);
    opacity: 0.8;
    z-index: 0;
  }

  main, header.topbar, footer { position: relative; z-index: 1; }

  /* ── Topbar ──────────────────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 80;
    background: color-mix(in oklch, var(--paper) 80%, transparent);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--rule);
  }
  .topbar-inner {
    max-width: var(--maxw); margin: 0 auto;
    padding: 14px var(--gutter);
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 32px; align-items: center;
  }
  .brand { display: inline-flex; align-items: center; gap: 12px; cursor: pointer; }
  .brand-mark {
    width: 36px; height: 36px; border-radius: 8px;
    background: transparent; color: var(--accent-ink);
    background-image: url('gur.svg');
    background-size: 130% 130%;
    background-position: center;
    background-repeat: no-repeat;
    display: grid; place-items: center;
    font-family: var(--mono); font-weight: 700; font-size: 14px;
    position: relative;
  }
  .brand-mark::before {
    content: ""; position: absolute; inset: -3px; border-radius: 10px;
    border: 1px solid var(--accent);
    opacity: 0.5;
    animation: ring 2.4s ease-in-out infinite;
  }
  @keyframes ring { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.45); opacity: 0; } }
  .brand-text { font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; line-height: 1.2; display: flex; flex-direction: column; }
  .brand-text b { color: var(--ink); font-weight: 500; display: block; }
  .brand-text span { color: var(--muted); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-top: 2px; }

  .topnav { display: inline-flex; gap: 4px; background: var(--soft); padding: 4px; border-radius: 999px; border: 1px solid var(--rule); }
  .topnav a {
    padding: 8px 16px; border-radius: 999px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--muted);
    transition: color .2s, background .2s;
  }
  .topnav a:hover { color: var(--ink); }
  .topnav a.active { color: var(--accent-ink); background: var(--accent); }

  .topright { display: inline-flex; gap: 12px; align-items: center; justify-self: end; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .live {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border: 1px solid var(--rule); border-radius: 999px;
  }
  .live::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .pill-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 999px;
    background: var(--accent); color: var(--accent-ink);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500;
    transition: filter .2s;
  }
  .pill-cta:hover { filter: brightness(1.15); }

  /* ── Hero ────────────────────────────────────────────── */
  .hero {
    position: relative;
    padding: calc(70px * var(--density)) var(--gutter) calc(40px * var(--density));
    max-width: var(--maxw); margin: 0 auto;
    overflow: hidden;
  }
  .hero-bg-logo {
    position: absolute;
    top: 38%; right: -15%;
    transform: translateY(-50%);
    width: 68%;
    aspect-ratio: 1 / 1;
    background-image: url('gur.svg');
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    opacity: 0.78;
    pointer-events: none;
    z-index: 0;
    filter: brightness(1.05);
  }
  [data-mode="light"] .hero-bg-logo { opacity: 0.75; }
  .hero-content { position: relative; z-index: 1; }
  .hero-bg-num {
    position: absolute; right: var(--gutter); top: 30px; bottom: 30px;
    font-family: var(--display); font-weight: 800;
    font-size: clamp(280px, 38vw, 720px);
    line-height: 0.8;
    color: var(--soft);
    z-index: 0; user-select: none;
    letter-spacing: -0.05em;
    pointer-events: none;
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-tags {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .tag {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
    color: var(--muted);
  }
  .tag.accent { color: var(--accent); border-color: color-mix(in oklch, var(--accent) 40%, transparent); background: color-mix(in oklch, var(--accent) 8%, transparent); }
  .tag.accent::before { content: "▸"; }

  .hero h1 {
    font-family: var(--display); font-weight: 500;
    font-size: clamp(44px, 7.2vw, 132px);
    line-height: 0.86;
    letter-spacing: -0.045em;
    margin: 0;
    max-width: 14ch;
  }
  .hero h1 .accent { color: var(--accent); font-style: italic; font-weight: 600; }
  .hero h1 .underline {
    background-image: linear-gradient(var(--accent), var(--accent));
    background-repeat: no-repeat;
    background-size: 100% 4px;
    background-position: 0 100%;
    padding-bottom: 4px;
  }
  .hero h1 .strike { position: relative; }
  .hero h1 .strike::after {
    content: ""; position: absolute; left: -4px; right: -4px; top: 50%; height: 6px; background: var(--accent); transform: translateY(-30%) rotate(-1deg); border-radius: 2px;
  }
  .hero h1 .marker {
    background: var(--accent); color: var(--accent-ink);
    padding: 0 10px; border-radius: 8px; display: inline-block;
    font-weight: 600;
  }

  .hero-foot {
    margin-top: 64px;
    display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 32px;
    padding-top: 36px; border-top: 1px solid var(--rule);
    align-items: start;
  }
  .hero-lede { font-size: 18px; line-height: 1.55; color: var(--ink); max-width: 46ch; }
  .hero-lede strong { color: var(--accent); font-weight: 500; }
  .cta-stack { display: flex; flex-direction: column; gap: 12px; align-items: flex-start; }
  .cta-stack h5 { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 0 0 4px; font-weight: 500; }

  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px;
    border-radius: 999px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500;
    cursor: pointer; border: 1px solid transparent;
    transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: var(--accent-ink); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px color-mix(in oklch, var(--accent) 50%, transparent); }
  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--rule-strong); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn .arrow { transition: transform .2s; display: inline-block; }
  .btn:hover .arrow { transform: translate(3px, -3px); }

  /* ── Ticker ──────────────────────────────────────────── */
  .ticker {
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    background: var(--soft);
    overflow: hidden; padding: 16px 0;
    font-family: var(--mono); font-size: 13px; color: var(--muted);
  }
  .ticker-track { display: flex; gap: 40px; white-space: nowrap; animation: scroll-x 40s linear infinite; }
  .ticker span { display: inline-flex; align-items: center; gap: 16px; }
  .ticker .acc { color: var(--accent); }
  @keyframes scroll-x { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ── Stats ──────────────────────────────────────────── */
  .stats {
    max-width: var(--maxw); margin: 0 auto;
    padding: calc(120px * var(--density)) var(--gutter);
    display: grid; grid-template-columns: 1fr 2fr; gap: 80px;
    align-items: center;
  }
  .stats-intro { position: sticky; top: 100px; align-self: start; }
  .stats-intro .label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .stats-intro h2 { font-family: var(--display); font-weight: 500; font-size: clamp(40px, 4.5vw, 64px); line-height: 1; letter-spacing: -0.03em; margin: 0 0 20px; }
  .stats-intro h2 .acc { color: var(--accent); font-style: italic; }
  .stats-intro p { color: var(--muted); max-width: 32ch; font-size: 15px; }

  .stats-grid { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--rule); }
  .stat {
    display: grid; grid-template-columns: 120px 1fr auto;
    gap: 32px; align-items: end;
    padding: 36px 0; border-bottom: 1px solid var(--rule);
    transition: padding .2s;
  }
  .stat:hover { padding-left: 12px; }
  .stat .ix { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; padding-bottom: 18px; }
  .stat .ix b { display: block; color: var(--accent); font-weight: 500; }
  .stat .num {
    font-family: var(--display); font-weight: 500;
    font-size: clamp(72px, 9vw, 144px); line-height: 0.88; letter-spacing: -0.045em;
  }
  .stat .num .acc { color: var(--accent); }
  .stat .desc { text-align: right; font-size: 14px; color: var(--muted); max-width: 30ch; padding-bottom: 24px; }
  .stat .desc b { color: var(--ink); font-weight: 500; }

  /* ── Section heading ────────────────────────────────── */
  .sec { max-width: var(--maxw); margin: 0 auto; padding: calc(80px * var(--density)) var(--gutter); }
  .sec-head {
    display: grid; grid-template-columns: 200px 1fr auto; gap: 32px;
    align-items: end; padding-bottom: 32px; border-bottom: 1px solid var(--rule); margin-bottom: 48px;
  }
  .sec-head .ix { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
  .sec-head h2 { font-family: var(--display); font-weight: 500; font-size: clamp(40px, 5vw, 80px); line-height: 0.96; letter-spacing: -0.035em; margin: 0; }
  .sec-head h2 .acc { color: var(--accent); font-style: italic; }
  .sec-head .meta { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

  /* ── Programs ───────────────────────────────────────── */
  .programs-stack { display: flex; flex-direction: column; gap: 16px; }
  .program-card {
    border: 1px solid var(--rule); border-radius: 16px;
    padding: 36px;
    display: grid; grid-template-columns: 80px 1.2fr 2fr auto; gap: 36px;
    align-items: start; cursor: pointer;
    transition: border-color .25s, background .25s, transform .25s;
    background: var(--soft);
    position: relative; overflow: hidden;
  }
  .program-card::after {
    content: ""; position: absolute; top: 0; right: 0; width: 200px; height: 200px;
    background: radial-gradient(circle, color-mix(in oklch, var(--accent) 18%, transparent) 0, transparent 70%);
    transform: translate(80px, -80px);
    opacity: 0; transition: opacity .3s;
  }
  .program-card:hover { border-color: color-mix(in oklch, var(--accent) 60%, transparent); transform: translateY(-2px); }
  .program-card:hover::after { opacity: 1; }
  .program-card .ix {
    font-family: var(--display); font-weight: 500;
    font-size: 64px; line-height: 0.9; color: var(--accent); letter-spacing: -0.03em;
  }
  .program-card .title { display: flex; flex-direction: column; gap: 8px; }
  .program-card .title .kicker { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .program-card .title h3 { font-family: var(--display); font-weight: 500; font-size: 34px; line-height: 1.05; margin: 0; letter-spacing: -0.02em; }
  .program-card .body p { margin: 0 0 16px; font-size: 15px; color: var(--muted); line-height: 1.55; max-width: 60ch; }
  .program-card .body .tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .program-card .body .tag { background: var(--paper); border-color: var(--rule); }
  .program-card .cta-area { display: flex; flex-direction: column; align-items: flex-end; gap: 14px; min-width: 120px; }
  .program-card .arrow-circle {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid var(--rule-strong);
    display: grid; place-items: center;
    font-family: var(--mono); font-size: 18px;
    transition: background .2s, color .2s, border-color .2s, transform .2s;
  }
  .program-card:hover .arrow-circle { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); transform: rotate(-45deg); }
  .program-card .cta-area .meta { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); text-align: right; }

  /* ── How we work ─────────────────────────────────────── */
  .process {
    display: grid; grid-template-columns: 1fr 2fr; gap: 60px;
  }
  .process-intro h3 { font-family: var(--display); font-weight: 500; font-size: clamp(40px, 5vw, 72px); line-height: 0.95; letter-spacing: -0.03em; margin: 0 0 20px; }
  .process-intro h3 .acc { color: var(--accent); font-style: italic; }
  .process-intro p { color: var(--muted); max-width: 32ch; font-size: 15px; }
  .steps { display: flex; flex-direction: column; gap: 12px; }
  .step {
    display: grid; grid-template-columns: 80px 1fr; gap: 24px;
    padding: 28px; border-radius: 16px;
    background: var(--soft); border: 1px solid var(--rule);
    align-items: start;
    transition: border-color .2s, transform .15s;
    position: relative;
  }
  .step:hover { border-color: color-mix(in oklch, var(--accent) 60%, transparent); }
  .step:hover .n { color: var(--accent); }
  .step .n {
    font-family: var(--display); font-weight: 600;
    font-size: 56px; line-height: 0.9; letter-spacing: -0.03em;
    color: var(--muted); transition: color .2s;
  }
  .step h4 { font-family: var(--display); font-weight: 500; font-size: 24px; margin: 0 0 8px; letter-spacing: -0.015em; }
  .step p { font-size: 14px; color: var(--muted); margin: 0; line-height: 1.6; }

  /* ── Gallery ────────────────────────────────────────── */
  .gallery {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 14px;
  }
  .tile {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: transform .25s, box-shadow .25s, border-color .25s;
  }
  .tile:hover { transform: translateY(-3px) scale(1.005); border-color: color-mix(in oklch, var(--accent) 60%, transparent); box-shadow: 0 12px 40px color-mix(in oklch, var(--accent) 18%, transparent); }
  .tile::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 30%, color-mix(in oklch, var(--accent) 14%, transparent), transparent 60%),
      repeating-linear-gradient(45deg, transparent 0 12px, color-mix(in oklch, var(--ink) 4%, transparent) 12px 13px);
  }
  .tile .tag-tl {
    position: absolute; top: 14px; left: 14px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; color: var(--accent);
    background: color-mix(in oklch, var(--paper) 80%, transparent);
    backdrop-filter: blur(8px);
    padding: 6px 10px; border-radius: 999px;
    z-index: 1;
  }
  .tile .cap {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 16px 18px; z-index: 1;
    background: linear-gradient(transparent, color-mix(in oklch, var(--paper) 80%, transparent));
    font-family: var(--display); font-size: 18px; font-weight: 500; letter-spacing: -0.01em;
  }
  .t1 { grid-column: span 7; aspect-ratio: 16/10; }
  .t2 { grid-column: span 5; aspect-ratio: 4/5; }
  .t3 { grid-column: span 4; aspect-ratio: 1; }
  .t4 { grid-column: span 4; aspect-ratio: 1; }
  .t5 { grid-column: span 4; aspect-ratio: 1; }

  /* ── CTA banner ─────────────────────────────────────── */
  .cta-banner {
    margin: 0 var(--gutter) 80px;
    max-width: calc(var(--maxw) - var(--gutter) * 2);
    margin-left: auto; margin-right: auto;
    padding: 80px 60px;
    background: var(--accent);
    color: var(--accent-ink);
    border-radius: 24px;
    position: relative; overflow: hidden;
  }
  .cta-banner::before {
    content: "✦"; position: absolute; top: -40px; right: -40px;
    font-size: 360px; opacity: 0.12; line-height: 0.8;
    color: var(--accent-ink); pointer-events: none;
  }
  .cta-banner-inner { position: relative; z-index: 1; display: grid; grid-template-columns: 1.4fr 1fr; gap: 60px; align-items: end; }
  .cta-banner h2 { font-family: var(--display); font-weight: 500; font-size: clamp(48px, 6vw, 96px); line-height: 0.96; margin: 0; letter-spacing: -0.04em; max-width: 14ch; }
  .cta-banner h2 .italic { font-style: italic; font-weight: 600; }
  .cta-banner .meta { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; opacity: 0.7; }
  .cta-banner .actions { display: flex; flex-direction: column; gap: 12px; align-items: flex-start; }
  .cta-banner .btn-primary { background: var(--accent-ink); color: var(--accent); }
  .cta-banner .btn-primary:hover { background: var(--paper); }
  .cta-banner .btn-ghost { color: var(--accent-ink); border-color: rgba(0,0,0,0.3); }
  .cta-banner .btn-ghost:hover { background: var(--accent-ink); color: var(--accent); border-color: var(--accent-ink); }

  /* ── Footer ──────────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--rule);
    padding: 60px 0 28px;
    background: var(--paper-2);
  }
  .foot { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gutter); }
  .foot-top { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; padding-bottom: 48px; border-bottom: 1px solid var(--rule); }
  .foot-brand h4 { font-family: var(--display); font-weight: 500; font-size: 36px; margin: 0 0 14px; letter-spacing: -0.02em; line-height: 1.05; }
  .foot-brand h4 .acc { color: var(--accent); }
  .foot-brand p { color: var(--muted); max-width: 40ch; font-size: 14px; }
  .foot-top h5 { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 0 0 14px; font-weight: 500; }
  .foot-top ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
  .foot-top a:hover { color: var(--accent); }
  .foot-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 24px; font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
  .foot-bottom .ascii { color: var(--accent); }

  /* ── Inner pages ─────────────────────────────────────── */
  .pageheader { max-width: var(--maxw); margin: 0 auto; padding: calc(80px * var(--density)) var(--gutter); position: relative; overflow: hidden; }
  .pageheader .meta-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 40px; }
  .pageheader h1 { font-family: var(--display); font-weight: 500; font-size: clamp(44px, 7.2vw, 132px); line-height: 0.86; letter-spacing: -0.045em; margin: 0; max-width: 16ch; }
  .pageheader h1 .acc { color: var(--accent); font-style: italic; font-weight: 600; }
  .pageheader .lede { font-size: 18px; line-height: 1.55; color: var(--ink); max-width: 60ch; margin: 36px 0 0; }
  .pageheader .lede strong { color: var(--accent); font-weight: 500; }

  /* About */
  .about-grid {
    max-width: var(--maxw); margin: 0 auto;
    padding: 60px var(--gutter) 80px;
    display: grid; grid-template-columns: 1fr 1.2fr; gap: 80px;
    align-items: start;
  }
  .about-grid h2 { font-family: var(--display); font-weight: 500; font-size: 56px; line-height: 1; letter-spacing: -0.03em; margin: 0 0 20px; }
  .about-grid h2 .acc { color: var(--accent); font-style: italic; }
  .about-grid .body { font-size: 16px; line-height: 1.65; display: flex; flex-direction: column; gap: 18px; }
  .about-grid .body p { margin: 0; }

  .stat-cards { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gutter) 80px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .stat-card { background: var(--soft); border: 1px solid var(--rule); border-radius: 16px; padding: 28px; }
  .stat-card .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .stat-card .v { font-family: var(--display); font-weight: 500; font-size: 44px; line-height: 1; letter-spacing: -0.025em; }
  .stat-card .v .acc { color: var(--accent); }

  .team-grid { max-width: var(--maxw); margin: 0 auto; padding: 60px var(--gutter); display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .person {
    display: flex; flex-direction: column; gap: 12px;
    padding: 18px; border-radius: 16px; background: var(--soft); border: 1px solid var(--rule);
    transition: border-color .2s, transform .2s;
  }
  .person:hover { border-color: color-mix(in oklch, var(--accent) 60%, transparent); transform: translateY(-2px); }
  .person .portrait {
    aspect-ratio: 1; border-radius: 12px;
    background:
      radial-gradient(circle at 30% 30%, color-mix(in oklch, var(--accent) 18%, transparent), transparent 60%),
      var(--paper-2);
    border: 1px solid var(--rule);
    display: flex; align-items: flex-end; padding: 12px;
    font-family: var(--mono); font-size: 10px; color: var(--muted);
  }
  .person .name { font-family: var(--display); font-weight: 500; font-size: 20px; line-height: 1.1; letter-spacing: -0.015em; }
  .person .role { font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; color: var(--muted); text-transform: uppercase; }
  .person .bio { font-size: 13px; line-height: 1.6; color: var(--muted); margin-top: 4px; }

  /* Additional members roster */
  .members-roster { max-width: var(--maxw); margin: 0 auto; padding: 0 var(--gutter) 60px; }
  .members-roster-inner { border: 1px solid var(--rule); border-radius: 20px; overflow: hidden; }
  .members-roster-header { padding: 20px 28px; border-bottom: 1px solid var(--rule); display: flex; align-items: baseline; gap: 12px; }
  .members-roster-header .ix { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; }
  .members-roster-header h3 { font-family: var(--display); font-weight: 500; font-size: 22px; letter-spacing: -0.02em; margin: 0; }
  .members-list { display: grid; grid-template-columns: repeat(5, 1fr); }
  .member-item { padding: 16px 28px; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule); transition: background .15s; }
  .member-item:hover { background: var(--soft); }
  .member-item:nth-child(5n) { border-right: none; }
  .member-item:nth-last-child(-n+5) { border-bottom: none; }
  .member-item .m-name { font-family: var(--display); font-weight: 500; font-size: 15px; letter-spacing: -0.01em; line-height: 1.2; }
  .member-item .m-grade { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; margin-top: 3px; }
  @media (max-width: 900px) { .members-list { grid-template-columns: repeat(3, 1fr); } .member-item:nth-child(5n) { border-right: 1px solid var(--rule); } .member-item:nth-child(3n) { border-right: none; } }
  @media (max-width: 540px) { .members-list { grid-template-columns: repeat(2, 1fr); } .member-item:nth-child(3n) { border-right: 1px solid var(--rule); } .member-item:nth-child(2n) { border-right: none; } }

  /* Projects detail */
  .proj-cards { max-width: var(--maxw); margin: 0 auto; padding: 40px var(--gutter); display: flex; flex-direction: column; gap: 16px; }
  .proj-card {
    border: 1px solid var(--rule); border-radius: 20px; background: var(--soft);
    padding: 32px; cursor: pointer; transition: border-color .2s, transform .2s;
    display: grid; grid-template-columns: 100px 1fr 240px; gap: 32px; align-items: start;
  }
  .proj-card:hover { border-color: color-mix(in oklch, var(--accent) 60%, transparent); }
  .proj-card .n {
    font-family: var(--display); font-weight: 500; font-size: 64px; line-height: 0.9; letter-spacing: -0.03em;
    color: color-mix(in oklch, var(--accent) 60%, transparent);
  }
  .proj-card h3 { font-family: var(--display); font-weight: 500; font-size: 36px; line-height: 1.05; margin: 0 0 12px; letter-spacing: -0.02em; }
  .proj-card h3 .acc { color: var(--accent); font-style: italic; }
  .proj-card p { color: var(--muted); font-size: 15px; line-height: 1.55; margin: 0 0 16px; max-width: 60ch; }
  .proj-card .pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .proj-card .meta-col { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
  .proj-card .meta-col .row { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .proj-card .meta-col .row b { color: var(--ink); font-weight: 500; }
  .proj-card .arrow-circle { width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--rule-strong); display: grid; place-items: center; font-family: var(--mono); transition: all .2s; }
  .proj-card:hover .arrow-circle { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); transform: rotate(-45deg); }

  /* Insights */
  .ins-featured {
    max-width: var(--maxw); margin: 0 auto;
    padding: 40px var(--gutter);
    border-radius: 24px;
  }
  .ins-fcard {
    display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
    background: var(--soft); border: 1px solid var(--rule); border-radius: 20px; padding: 40px;
    align-items: center;
  }
  .ins-fcard .left { display: flex; flex-direction: column; gap: 16px; }
  .ins-fcard .ix { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.06em; }
  .ins-fcard h2 { font-family: var(--display); font-weight: 500; font-size: clamp(36px, 4vw, 60px); line-height: 1; letter-spacing: -0.03em; margin: 0; }
  .ins-fcard h2 .acc { color: var(--accent); font-style: italic; }
  .ins-fcard p { color: var(--muted); font-size: 15px; line-height: 1.6; }
  .ins-fcard .by { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .ins-fcard .fig { aspect-ratio: 4/3; border-radius: 12px; background: radial-gradient(circle at 30% 30%, color-mix(in oklch, var(--accent) 18%, transparent), transparent 60%), var(--paper-2); border: 1px solid var(--rule); }

  .ins-grid { max-width: var(--maxw); margin: 0 auto; padding: 40px var(--gutter) 80px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .ins-item {
    padding: 28px; border-radius: 16px; background: var(--soft); border: 1px solid var(--rule);
    display: grid; grid-template-columns: 1fr 100px; gap: 24px; cursor: pointer; align-items: center;
    transition: border-color .2s, transform .2s;
  }
  .ins-item:hover { border-color: color-mix(in oklch, var(--accent) 60%, transparent); transform: translateY(-2px); }
  .ins-item .ix { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .ins-item h3 { font-family: var(--display); font-weight: 500; font-size: 22px; line-height: 1.15; margin: 0 0 12px; letter-spacing: -0.015em; }
  .ins-item .by { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .ins-item .arrow-circle { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--rule-strong); display: grid; place-items: center; transition: all .2s; }
  .ins-item:hover .arrow-circle { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); transform: rotate(-45deg); }

  /* Get Involved */
  .paths { max-width: var(--maxw); margin: 0 auto; padding: 40px var(--gutter); display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .path-card {
    padding: 32px; border-radius: 20px; background: var(--soft); border: 1px solid var(--rule);
    display: grid; grid-template-columns: 80px 1fr auto; gap: 24px;
    align-items: center;
    cursor: pointer; position: relative; overflow: hidden;
    transition: border-color .2s, transform .2s;
  }
  .path-card:hover { border-color: color-mix(in oklch, var(--accent) 60%, transparent); transform: translateY(-2px); }
  .path-card .pn { font-family: var(--display); font-weight: 600; font-size: 48px; line-height: 0.9; color: var(--accent); letter-spacing: -0.03em; }
  .path-card h3 { font-family: var(--display); font-weight: 500; font-size: 26px; line-height: 1.1; margin: 0 0 8px; letter-spacing: -0.015em; }
  .path-card p { color: var(--muted); margin: 0; font-size: 14px; line-height: 1.55; }
  .path-card .arrow-circle { width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--rule-strong); display: grid; place-items: center; transition: all .2s; font-size: 16px; }
  .path-card:hover .arrow-circle { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); transform: rotate(-45deg); }

  .form-section {
    max-width: var(--maxw); margin: 0 auto;
    padding: 60px var(--gutter) 100px;
    display: grid; grid-template-columns: 1fr 1.4fr; gap: 60px;
  }
  .form-section .left h2 { font-family: var(--display); font-weight: 500; font-size: 52px; line-height: 1; letter-spacing: -0.03em; margin: 0 0 16px; }
  .form-section .left h2 .acc { color: var(--accent); font-style: italic; }
  .form-section .left p { color: var(--muted); max-width: 38ch; font-size: 15px; line-height: 1.6; }
  .form { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .field input, .field textarea {
    background: var(--soft); border: 1px solid var(--rule);
    padding: 14px 16px; font-family: var(--sans); font-size: 14px; color: var(--ink);
    border-radius: 12px; outline: none; transition: border-color .15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 100px; }
  .seg { display: flex; gap: 8px; flex-wrap: wrap; }
  .seg .chip { padding: 10px 16px; border: 1px solid var(--rule-strong); border-radius: 999px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; background: transparent; color: var(--ink); transition: all .15s; }
  .seg .chip.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .form-actions { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding-top: 12px; }
  .form-success { padding: 28px; border-radius: 16px; background: color-mix(in oklch, var(--accent) 18%, transparent); border: 1px solid var(--accent); color: var(--ink); font-size: 16px; }
  .form-success b { color: var(--accent); }

  /* Page transitions */
  .page { animation: pagefade .4s cubic-bezier(.2,.7,.2,1); }
  @keyframes pagefade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ── Dynamic tweak overrides ─────────────────────────── */
  .program-card, .step, .stat-card, .person, .proj-card, .path-card,
  .ins-fcard, .ins-item, .tile, .form-success, .field input, .field textarea,
  .cta-banner, .brand-mark {
    border-radius: var(--card-radius, 16px);
  }
  .person .portrait, .ins-fcard .fig { border-radius: calc(var(--card-radius, 16px) - 4px); }
  .arrow-circle { border-radius: 50%; } /* keep circle */

  /* User-fillable image placeholders. Drop files into ./images/<folder>/<slug>.jpg
     and they show up; missing files just reveal the patterned background. */
  .person .portrait, .ins-fcard .fig { position: relative; overflow: hidden; }
  .ph-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: block; z-index: 0;
  }
  .person .portrait > *:not(.ph-img),
  .ins-fcard .fig > *:not(.ph-img) { position: relative; z-index: 1; }
  .person .portrait:has(.ph-img:not([hidden])) { color: transparent; }

  /* Tile texture override */
  .tile::before { background: var(--tile-bg) !important; }

  /* Glow strength */
  .live::before { box-shadow: 0 0 calc(var(--glow-halo, 14px)) var(--accent); }
  .btn-primary:hover { box-shadow: 0 8px calc(var(--glow-halo, 32px) * 2) color-mix(in oklch, var(--accent) calc(50% * var(--glow-strength, 1)), transparent); }
  .tile:hover { box-shadow: 0 12px 40px color-mix(in oklch, var(--accent) calc(18% * var(--glow-strength, 1)), transparent); }
  .brand-mark::before { animation-play-state: var(--glow-strength) ; }
  [data-glow="off"] .brand-mark::before { display: none; }
  [data-glow="off"] body::after { display: none; }
  [data-glow="strong"] body::after { opacity: 1.2; }

  /* Accent mark — exposed as var(--accent-mark) for any future use.
     The hardcoded "▸" in existing text is left alone. */

  /* hero alternate layouts */
  .hero h1 .italic-all { font-style: italic; color: var(--accent); font-weight: 600; }
  .hero h1.stacked { font-size: clamp(44px, 7.2vw, 132px); line-height: 0.96; max-width: 18ch; }
  .hero h1.stacked span { display: block; }

  @media (max-width: 1000px) {
    .topbar-inner { grid-template-columns: 1fr auto; }
    .topnav { display: none; }
    .hero h1 { font-size: clamp(44px, 7.2vw, 132px); }
    .hero-foot { grid-template-columns: 1fr; }
    .stats { grid-template-columns: 1fr; }
    .stat { grid-template-columns: 80px 1fr; }
    .stat .desc { grid-column: 1/-1; text-align: left; padding-top: 8px; }
    .program-card { grid-template-columns: 1fr; gap: 16px; }
    .process { grid-template-columns: 1fr; }
    .gallery { grid-template-columns: 1fr 1fr; }
    .t1, .t2, .t3, .t4, .t5 { grid-column: span 2; aspect-ratio: 16/10; }
    .cta-banner-inner { grid-template-columns: 1fr; }
    .foot-top { grid-template-columns: 1fr 1fr; }
    .stat-cards, .team-grid { grid-template-columns: 1fr 1fr; }
    .proj-card { grid-template-columns: 60px 1fr; }
    .proj-card .meta-col { grid-column: 1/-1; align-items: flex-start; }
    .paths { grid-template-columns: 1fr; }
    .ins-grid { grid-template-columns: 1fr; }
    .ins-fcard { grid-template-columns: 1fr; }
    .about-grid { grid-template-columns: 1fr; gap: 32px; }
    .form-section { grid-template-columns: 1fr; gap: 32px; }
  }
</style>
</head>

// ── Animated counter ────────────────────────────────
function Counter({ target, prefix = "", suffix = "" }) {
  const [n, setN] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    let raf = null, started = false;
    const num = parseInt(target.replace(/,/g, ""), 10) || 0;
    const obs = new IntersectionObserver((es) => {
      es.forEach(e => {
        if (e.isIntersecting && !started) {
          started = true;
          const dur = 1400; const t0 = performance.now();
          const tick = (t) => {
            const p = Math.min(1, (t - t0) / dur);
            const eased = 1 - Math.pow(1 - p, 3);
            setN(Math.round(num * eased));
            if (p < 1) raf = requestAnimationFrame(tick);
          };
          raf = requestAnimationFrame(tick);
        }
      });
    }, { threshold: 0.3 });
    obs.observe(el);
    return () => { obs.disconnect(); if (raf) cancelAnimationFrame(raf); };
  }, [target]);
  return <span ref={ref}>{prefix}{n.toLocaleString()}<span className="acc">{suffix}</span></span>;
}

      </TweakSection>
      <TweakSection label="Type">
        <TweakSelect label="Font" value={tweaks.fontPair} options={Object.entries(FONT_PAIRS).map(([k,v]) => [k, v.name])} onChange={(v) => setTweak("fontPair", v)} />
        <TweakSelect label="Accent mark" value={tweaks.accentMark}
          options={[["▸","▸ Triangle"],["●","● Dot"],["◆","◆ Diamond"],["✦","✦ Sparkle"],["▲","▲ Up-tri"],["■","■ Square"]]}

      </TweakSection>

        <TweakSelect label="Hero" value={tweaks.heroLayout}
          options={[["marker","Marker"],["underline","Underline"],["strike","Strike"],["stack","Stacked"],["italic","All italic"]]}
          onChange={(v) => setTweak("heroLayout", v)} />
        <TweakSelect label="Card radius" value={tweaks.cardRadius}
          options={[["sharp","Sharp"],["soft","Soft"],["round","Round"],["pill","Pill"]]}
          onChange={(v) => setTweak("cardRadius", v)} />
        <TweakSelect label="Tile texture" value={tweaks.tileTexture}
          options={[["scan","Scan-lines"],["grid","Grid"],["dots","Dots"],["noise","Noise"],["blur","Blur"],["solid","Solid"]]}

    </TweaksPanel>
  );

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRouteState] = useState(() => {
    const h = window.location.hash.replace("#", "");
    return NAV.find(n => n.id === h) ? h : "home";
  });
  const setRoute = (id) => {
    setRouteState(id);
    window.location.hash = id;
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
  useEffect(() => {
    const onHash = () => {
      const h = window.location.hash.replace("#", "");
      if (NAV.find(n => n.id === h)) setRouteState(h);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  useEffect(() => {
    const root = document.documentElement;
    const p = PALETTES[tweaks.palette] || PALETTES.signal;
    const v = p[tweaks.mode] || p.dark;
    root.style.setProperty("--ink", v.ink);
    root.style.setProperty("--paper", v.paper);
    root.style.setProperty("--accent", v.accent);
    root.style.setProperty("--accent-ink", v.paper);
    root.dataset.mode = tweaks.mode;
    root.style.setProperty("--density", DENSITIES[tweaks.density]);
    root.style.setProperty("--card-radius", CARD_RADII[tweaks.cardRadius] || "16px");
    root.style.setProperty("--tile-bg", TILE_TEXTURES[tweaks.tileTexture] || TILE_TEXTURES.scan);
    const glow = GLOWS[tweaks.glow] || GLOWS.soft;
    root.style.setProperty("--glow-strength", glow.strength);
    root.style.setProperty("--glow-halo", glow.halo + "px");
    root.style.setProperty("--accent-mark", `"${tweaks.accentMark || "▸"} "`);
    root.dataset.glow = tweaks.glow;
    const fp = FONT_PAIRS[tweaks.fontPair] || FONT_PAIRS.bricolage;
    root.style.setProperty("--display", fp.display);
    root.style.setProperty("--sans", fp.sans);
    if (fp.load && !document.getElementById("font-extra-" + tweaks.fontPair)) {
      const link = document.createElement("link");
      link.id = "font-extra-" + tweaks.fontPair;
      link.rel = "stylesheet";
      link.href = "https://fonts.googleapis.com/css2?family=" + fp.load + "&display=swap";
      document.head.appendChild(link);
    }
  }, [tweaks]);

  // Swap accent-mark glyphs in the DOM after every render
  useEffect(() => {
    const mark = tweaks.accentMark || "▸";
    const allMarks = /[▸●◆✦▲■]/g;
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null);
    const targets = [];
    while (walker.nextNode()) targets.push(walker.currentNode);
    targets.forEach(n => {
      if (allMarks.test(n.nodeValue)) {
        const newVal = n.nodeValue.replace(allMarks, mark);
        if (newVal !== n.nodeValue) n.nodeValue = newVal;
      }
    });
  });

  const Page = { home: Home, about: About, projects: Projects, insights: Insights, involve: GetInvolved }[route] || Home;

  return (
    <>
      <Header route={route} setRoute={setRoute} />
      <Page key={route} setRoute={setRoute} tweaks={tweaks} />
      <Footer setRoute={setRoute} />
      <Tweaks tweaks={tweaks} setTweak={setTweak} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
